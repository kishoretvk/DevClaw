name: Test on Pull Request

on:
  pull_request:
    branches: [ main, develop ]
  push:
    branches: [ main, develop ]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.8", "3.11", "3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
          pip install pytest pytest-cov

      - name: Run linting
        run: |
          # Run basic linting if tools are available
          python -m pip install flake8 black isort || true
          flake8 csa/ tests/ --count --select=E9,F63,F7,F82 --show-source --statistics || true
          black --check csa/ tests/ || true

      - name: Run tests
        run: |
          pytest tests/ -v --tb=short

      - name: Test package build
        run: |
          pip install build
          python -m build --wheel
          rm -rf dist/  # Clean up test build